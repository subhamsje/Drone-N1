# Altaria Cognitive OS — Kubernetes deployment (production template)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altaria-cognitive-os
  labels:
    app: altaria-os
spec:
  replicas: 3
  selector:
    matchLabels:
      app: altaria-os
  template:
    metadata:
      labels:
        app: altaria-os
    spec:
      containers:
        - name: cognitive-backend
          image: altaria/cognitive-os:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: ALTARIA_EVENT_BACKEND
              value: kafka
            - name: TRITON_URL
              value: http://triton-inference:8000
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: altaria-db
                  key: url
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: altaria-cognitive-os
spec:
  selector:
    app: altaria-os
  ports:
    - port: 80
      targetPort: 8080
---
# GPU inference pool (Triton)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: triton
  template:
    metadata:
      labels:
        app: triton
    spec:
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.01-py3
          args: ["tritonserver", "--model-repository=/models"]
          ports:
            - containerPort: 8000
            - containerPort: 8001
          resources:
            limits:
              nvidia.com/gpu: 1
